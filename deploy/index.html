<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MatGo</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 2rem; background: #f5f5f5; }
    .hero { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .hero img { width: 48px; height: 48px; object-fit: contain; }
    h1 { color: #333; margin: 0; }
    .links { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 2rem; }
    a { display: inline-block; padding: 1rem 1.5rem; background: #ffc107; color: #000; text-decoration: none; border-radius: 8px; font-weight: 600; }
    a:hover { background: #ffb300; }
    .coming { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <div class="hero">
    <img src="logo.png" alt="MatGo" />
    <h1>MatGo</h1>
  </div>
  <p>Materiál na stavbu do hodiny</p>
  <div class="links">
    <a href="/client_app/">Client App (zákazníci)</a>
    <a href="/shop_app/eiGPSubFE4BVOCCVajYd">Shop App (stavebniny)</a>
    <a href="/driver_app/">Driver App (vodiči)</a>
    <a href="/admin/">Admin (superuser / správa obchodov)</a>
  </div>
</body>
</html>
